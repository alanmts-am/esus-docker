services:
  pec:
    container_name: esus
    image: esus:${ESUS_IMAGE}
    pull_policy: build
    platform: linux/amd64
    volumes:
      - ${ESUS_VOLUME_PATH}/${ESUS_IMAGE}/opt:/opt/e-SUS
      - ${ESUS_VOLUME_PATH}/${ESUS_IMAGE}/backups:/backups
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    build:
      context: .
      dockerfile: Dockerfile
      args:
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ESUS_DOWNLOAD_URL: ${ESUS_DOWNLOAD_URL}
    environment:
      - TZ=America/Recife
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
    privileged: true
    stdin_open: true
    tty: true
    ports:
      - "8081:8080"
      - "8082:80"
      - "8083:443"